services:
  - type: web
    name: erp-suite-backend
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    autoDeployTrigger: commit
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false

  - type: web
    name: erp-suite-frontend
    runtime: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    autoDeployTrigger: commit
    healthCheckPath: /login
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_HOSTPORT
        fromService:
          name: erp-suite-backend
          type: web
          property: hostport
      - key: INTERNAL_API_BASE_URL
        sync: false
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false
